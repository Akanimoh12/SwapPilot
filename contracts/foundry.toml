[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
ffi = true
fs_permissions = [{ access = "read-write", path = "./" }]

[fuzz]
runs = 256

[invariant]
runs = 128

[rpc_endpoints]
unichain = "${UNICHAIN_RPC_URL}"
unichain_testnet = "https://sepolia.unichain.org"
reactive = "https://lasna-rpc.rnk.dev/"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
