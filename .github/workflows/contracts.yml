name: Contracts

on:
  push:
    branches: [main]
    paths: ["contracts/**"]
  pull_request:
    branches: [main]
    paths: ["contracts/**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build
        run: forge build

      - name: Run tests
        run: forge test -vvv

      - name: Check formatting
        run: forge fmt --check
